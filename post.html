<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      padding: 40px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: left;
    }

    .post {
      padding: 15px;
      background: #eee;
      margin-bottom: 20px;
    }

    button {
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">
  <h1 id="pageTitle">Loading...</h1>

  <div id="post"></div>

  <button onclick="goBack()">Back</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = Number(params.get("id"));

let posts = JSON.parse(localStorage.getItem("posts")) || [];

const post = posts.find(p => p.id === id);

if (post) {
  document.getElementById("post").innerHTML = `
    <h2>${post.title}</h2>
    <p><b>${post.nickname}</b></p>
    <p>${post.content}</p>
  `;

  // 핵심: 탭 제목 + 페이지 제목 둘 다 변경
  document.title = `${post.title} | Data Literature Lab`;
  document.getElementById("pageTitle").innerText = post.title;

} else {
  document.getElementById("post").innerHTML = "Cannot find content";
}

function goBack() {
  location.href = "index.html";
}
</script>

</body>
</html>
