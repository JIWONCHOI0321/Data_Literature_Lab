<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Data Literature Lab</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      padding: 40px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .post {
      margin-top: 15px;
      padding: 10px;
      background: #eee;
      cursor: pointer;
      text-align: left;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Data Literature Lab</h1>

  <input id="nickname" placeholder="Enter Nickname" />
  <input id="title" placeholder="Enter Title" />
  <textarea id="content" placeholder="Enter superb content"></textarea>

  <button onclick="addPost()">Upload</button>

  <div id="posts"></div>
</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];

function savePosts() {
  localStorage.setItem("posts", JSON.stringify(posts));
}

function addPost() {
  const nickname = document.getElementById("nickname").value;
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  if (!nickname || !title || !content) {
    alert("Enter content!");
    return;
  }

  const post = {
    id: Date.now(),
    nickname,
    title,
    content
  };

  posts.unshift(post);
  savePosts();
  renderPosts();

  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
}

function renderPosts() {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  posts.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <b>${post.nickname}</b><br>
      <strong>${post.title}</strong>
    `;

    div.onclick = () => {
      location.href = `post.html?id=${post.id}`;
    };

    container.appendChild(div);
  });
}

renderPosts();
</script>

</body>
</html>
