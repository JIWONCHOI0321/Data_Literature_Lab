<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Data Literature Lab</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 40px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      background: #333;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .post {
      margin-top: 20px;
      padding: 10px;
      background: #eee;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Data Literature Lab</h1>

    <input id="nickname" placeholder="Enter Nickname" />

    <textarea id="content" placeholder="Enter superb content"></textarea>

    <button onclick="addPost()">upload</button>

    <div id="posts"></div>
  </div>

  <script>
    function addPost() {
      const nickname = document.getElementById("nickname").value;
      const content = document.getElementById("content").value;

      if (!nickname || !content) {
        alert("*Enter Nickname and Content");
        return;
      }

      const postDiv = document.createElement("div");
      postDiv.className = "post";

      postDiv.innerHTML = `<b>${nickname}</b>: ${content}`;

      document.getElementById("posts").prepend(postDiv);

      document.getElementById("content").value = "";
    }
  </script>

</body>
</html>
