<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Data Literature Lab</title>
</head>
<body>

<h1>Data Literature Lab</h1>

<input id="nickname" placeholder="Enter Nickname"><br><br>
<input id="title" placeholder="Enter Title"><br><br>
<textarea id="content" placeholder="Enter superb content"></textarea><br><br>

<button onclick="uploadPost()">Upload</button>

<hr>

<div id="posts"></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const supabase = createClient(
    "https://wzcwmavhypviejordoq.supabase.co",
    "sb_publishable_Bgul_mpGk0KvysByPVusTw_nee2s4qa"
  );

  async function uploadPost() {
    const nickname = document.getElementById("nickname").value;
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    if (!nickname || !title || !content) {
      alert("Fill everything");
      return;
    }

    const { error } = await supabase.from("posts").insert([
      { nickname, title, content }
    ]);

    if (error) {
      console.error(error);
      alert("Error occurred");
    }

    loadPosts();
  }

  async function loadPosts() {
    const { data, error } = await supabase
      .from("posts")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) console.error(error);

    const container = document.getElementById("posts");
    container.innerHTML = "";

    data.forEach(post => {
      const div = document.createElement("div");
      div.innerHTML = `<b>${post.nickname}</b>: ${post.title}`;
      div.style.cursor = "pointer";

      div.onclick = () => {
        window.location.href = `post.html?id=${post.id}`;
      };

      container.appendChild(div);
    });
  }

  loadPosts();
  window.uploadPost = uploadPost;
</script>
</body>
</html>
